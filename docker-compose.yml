services:
  tms-backend:
    build: ./tms-backend
    restart: always
    depends_on:
      - database
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT}
      - HOST=${BACKEND_HOST}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./tms-backend:/usr/app/
      - /usr/app/node_modules
    networks:
      - tms-network
    command: npm run dev

  database:
    image: postgres:18-alpine
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:${DB_PORT}"
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - tms-network

  tms-frontend:
    build: ./tms-frontend
    restart: always
    env_file:
      - .env
    environment:
      - PORT=${FRONTEND_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./tms-frontend:/usr/app/
      - /usr/app/node_modules
    networks:
      - tms-network
    command: npm run dev

volumes:
  postgres-data:

networks:
  tms-network:
